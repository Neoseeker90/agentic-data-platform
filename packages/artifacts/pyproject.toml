[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "artifacts"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "contracts",
  "aioboto3>=13.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/artifacts"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
