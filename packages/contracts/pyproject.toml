[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "contracts"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.7.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/contracts"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
