[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "evaluation"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "contracts",
  "skill_sdk",
  "agent_api",
]

[tool.hatch.build.targets.wheel]
packages = ["src/evaluation"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
