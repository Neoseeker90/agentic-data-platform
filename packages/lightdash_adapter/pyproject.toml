[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "lightdash_adapter"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "contracts",
  "pydantic>=2.7.0",
  "httpx>=0.27.0",
  "pyyaml>=6.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/lightdash_adapter"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
