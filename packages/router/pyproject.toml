[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "router"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "contracts",
  "skill_sdk",
  "anthropic>=0.28.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/router"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
