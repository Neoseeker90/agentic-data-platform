[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "discover_metrics_and_dashboards"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "contracts",
  "skill_sdk",
  "lightdash_adapter",
  "dbt_adapter",
  "business_docs_adapter",
  "vector_store",
]

[tool.hatch.build.targets.wheel]
packages = ["src/discover_metrics_and_dashboards"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
