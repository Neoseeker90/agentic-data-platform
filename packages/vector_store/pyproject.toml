[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "vector_store"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
  "contracts",
  "pydantic>=2.7.0",
  "asyncpg>=0.29.0",
  "httpx>=0.27.0",
  "pgvector>=0.3.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/vector_store"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
